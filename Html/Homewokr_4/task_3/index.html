<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
        <form class="login-form" method="post">
            <div class="input-box-name">
                <input type="text" name="FirstName" placeholder="First name" required>
                <input type="text" name="LastName" placeholder="Last name" required>
                
            </div>
            <div class="email">
                <input type="email" name="email" placeholder="Email address" required>
            </div>

            <div class="password">
                <input type="password" name="password" placeholder="Password (6 or more characters)" required>
            </div>

            <div class="help-text">
                <p>By clicking Join Now, you agree to Linkedin's <span>User Agreement, Privacy Policy</span> and <span>Cookie Policy</span></p>
            </div>

            <div class="btn">
                <button type="submit" name="submit">Join Now</button>
            </div>
        </form>

</body>
</html>
