<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    
        .box{
            background: #a7a4a4;
            box-shadow: 0px 0px 10px 0px #000000;   
            margin: 10px;
        }
        .cart{
            border: 1px solid black;
            width: 300px;
            margin: 10px;
            padding: 10px;
        } 
    
        .infoUser{
    
            border: 1px solid black;
            width: 300px;
            margin: 10px;
            padding: 10px;
        }
    
        .btn{
    
            outline: none;
            border: none;
            width: 40%;
            border-radius: 15px;
            background: #cbc6c6;
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
    
        .btn:hover{
            background: #a7a4a4;
            transition: 0.5s;
        }
    
        .container{
            display: flex;
            flex-wrap: wrap;
        }
    
        .miniContainer{
            border:1px solid green;
        }
</style>
<body>
    <a  href = "shop.html">Shop</a>
    <button id = "clear">Clear</button>
    <script>
        let clear = document.getElementById("clear");
        clear.onclick = () =>{
            localStorage.clear();
            window.location.reload();
        }
        let data = localStorage.getItem("data") || "[]";
        data = JSON.parse(data);
        console.log(data);
        for (const i of data){
            let div = document.createElement("div");
            div.classList.add("box");
            div.innerHTML = `
                <div class = "cart">
                    <img src = "${i.img}" width = "100%" height = "200px">
                    <h3>${i.name}</h3>
                    <h3>${i.count}</h3>
                    <h3>${i.price}</h3>
                </div>
            `;
            let btn = document.createElement('button')
            btn.innerHTML = "Delete";
            btn.onclick = () =>{
                console.log(i);
                 data.splice(data.indexOf(i) , 1);
                console.log(data);
                localStorage.setItem("data", JSON.stringify(data));   
                window.location.reload();
            }
            div.appendChild(btn);
            document.body.appendChild(div);
        }
    </script>
    
</body>
</html>
