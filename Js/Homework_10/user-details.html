<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User-details</title>
</head>
<body>
    

    <script >
        let test = {id: 1, name: "vasya", age: 31, status: false, wife: {name: "Oksana", age: 30}};
        
        let url = new URL(window.location.href);
        let params = new URLSearchParams(url.search);
        let id = params.get('id');

        let parse = (data) =>{
            
            for (const i in data){
                
                if ( typeof data[i] == 'object' ){
                    parse(data[i]);
                }
            
            }
            return data;
        }
    
        fetch(`https://jsonplaceholder.typicode.com/users/${id}`)
        .then(response => response.json())
        .then(fetchedData => {
           let div = document.createElement('div');
           div.classList.add('cart');
              document.body.append(div);
              div.innerHTML = `
              <h1> Name: ${fetchedData.name} </h1>
                <p> Id: ${fetchedData.id} </p>
                <p> Username: ${fetchedData.username} </p>
                <p> Email: ${fetchedData.email} </p>
                <p> Phone: ${fetchedData.phone} </p>
                <p> Website: ${fetchedData.website} </p>
                <p> City: ${fetchedData.address.city} </p>
                <p> Street: ${fetchedData.address.street} </p>
                <p> Suite: ${fetchedData.address.suite} </p>
                <p> ZipCode: ${fetchedData.address.zipcode} </p>
                <p> GeoLat: ${fetchedData.address.geo.lat} </p>
                <p> GeoLng: ${fetchedData.address.geo.lng} </p>
                <p> CompanyName: ${fetchedData.company.name} </p>
                <p> CompanyCatchPhrase: ${fetchedData.company.catchPhrase} </p>
                <p> CompanyBs: ${fetchedData.company.bs} </p>
                `
            })
        
    </script>
</body>
</html>
